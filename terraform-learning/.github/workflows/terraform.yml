name: Terraform CI/CD

on:
  pull_request:
    paths:
      - 'terraform-learning/**'
  push:
    branches:
      - main
    paths:
      - 'terraform-learning/**'

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0

jobs:
  # ── PLAN DEV on every PR ─────────────────────────────────
  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC auth
      contents: read
      pull-requests: write # To post plan as PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_ACCOUNT_ID:role/GitHubActionsTerraformDev
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform-learning/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform-learning/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform-learning/environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_your_ip: ${{ secrets.MY_IP }}
          TF_VAR_key_name: ${{ vars.DEV_KEY_NAME }}
        run: terraform plan -out=tfplan -no-color 2>&1 | tee plan-output.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform-learning/environments/dev/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... truncated' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — Dev\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── APPLY DEV on merge to main ────────────────────────────
  apply-dev:
    name: Apply Dev
    needs: plan-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev  # Configure this in GitHub Settings → Environments

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_ACCOUNT_ID:role/GitHubActionsTerraformDev
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init
        working-directory: terraform-learning/environments/dev

      - name: Terraform Apply
        working-directory: terraform-learning/environments/dev
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_your_ip: ${{ secrets.MY_IP }}
          TF_VAR_key_name: ${{ vars.DEV_KEY_NAME }}
        run: terraform apply -auto-approve

  # ── APPLY PROD — requires manual approval ─────────────────
  apply-prod:
    name: Apply Prod
    needs: apply-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod  # Set "Required reviewers" in GitHub Settings → Environments

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::YOUR_ACCOUNT_ID:role/GitHubActionsTerraformProd
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init
        working-directory: terraform-learning/environments/prod

      - name: Terraform Apply
        working-directory: terraform-learning/environments/prod
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_your_ip: ${{ secrets.MY_IP }}
          TF_VAR_key_name: ${{ vars.PROD_KEY_NAME }}
        run: terraform apply -auto-approve
