version: 0.2

phases:
  pre_build:
    commands:
      - echo "PRE_BUILD - Logging in to Amazon ECR"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=$(if [ -n "$COMMIT_HASH" ]; then echo $COMMIT_HASH; else echo latest; fi)
      - IMAGE_URI=$ECR_REPOSITORY_URL:$IMAGE_TAG
      - IMAGE_LATEST=$ECR_REPOSITORY_URL:latest
      - echo "export IMAGE_TAG=$IMAGE_TAG" > /tmp/build_env.sh
      - echo "export IMAGE_URI=$IMAGE_URI" >> /tmp/build_env.sh
      - echo "export IMAGE_LATEST=$IMAGE_LATEST" >> /tmp/build_env.sh
      - cat /tmp/build_env.sh
      - echo "Image tag is $IMAGE_TAG"

  build:
    commands:
      - echo "BUILD - Building Docker image"
      - source /tmp/build_env.sh
      - echo "Building $IMAGE_URI"
      - docker build --no-cache -t $IMAGE_URI -t $IMAGE_LATEST ./app/
      - echo "Build complete"

  post_build:
    commands:
      - source /tmp/build_env.sh
      - echo "POST_BUILD - Pushing image to ECR"
      - docker push $IMAGE_URI
      - docker push $IMAGE_LATEST
      - echo "Push complete - writing imagedefinitions.json"
      - echo "[{\"name\":\"$CONTAINER_NAME\",\"imageUri\":\"$IMAGE_URI\"}]" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "Done. Awaiting manual approval in CodePipeline before ECS deploy."

artifacts:
  files:
    - imagedefinitions.json
  discard-paths: yes

cache:
  paths:
    - /root/.docker/**/*
