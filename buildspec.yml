version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== PRE_BUILD ==="
      - echo "Working dir $(pwd)"
      - echo "Src dir $CODEBUILD_SRC_DIR"
      - ls -la
      - ls -la app/ || echo "WARNING app/ folder not found at $(pwd)"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=$(if [ -n "$COMMIT_HASH" ]; then echo "$COMMIT_HASH"; else echo "latest"; fi)
      - IMAGE_URI="$ECR_REPOSITORY_URL:$IMAGE_TAG"
      - IMAGE_LATEST="$ECR_REPOSITORY_URL:latest"
      - echo "IMAGE_URI=$IMAGE_URI"
      - echo "IMAGE_LATEST=$IMAGE_LATEST"
      - echo "export IMAGE_TAG=$IMAGE_TAG" > /tmp/env.sh
      - echo "export IMAGE_URI=$IMAGE_URI" >> /tmp/env.sh
      - echo "export IMAGE_LATEST=$IMAGE_LATEST" >> /tmp/env.sh
      - echo "export APP_DIR=$(pwd)/app" >> /tmp/env.sh
      - cat /tmp/env.sh

  build:
    commands:
      - echo "=== BUILD ==="
      - . /tmp/env.sh
      - echo "IMAGE_URI=$IMAGE_URI"
      - echo "APP_DIR=$APP_DIR"
      - ls -la $APP_DIR
      - echo "--- Dockerfile contents ---"
      - cat $APP_DIR/Dockerfile
      - echo "--- Running docker build ---"
      - docker build --no-cache --progress=plain -t "$IMAGE_URI" -t "$IMAGE_LATEST" "$APP_DIR"

  post_build:
    commands:
      - echo "=== POST_BUILD ==="
      - . /tmp/env.sh
      - docker push "$IMAGE_URI"
      - docker push "$IMAGE_LATEST"
      - echo "[{\"name\":\"$CONTAINER_NAME\",\"imageUri\":\"$IMAGE_URI\"}]" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "Done."

artifacts:
  files:
    - imagedefinitions.json
  discard-paths: yes
